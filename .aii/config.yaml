      relation: referenced-by
      note: Journal materials cite Active Inference Ontology terms.
  links:
    website: https://www.activeinference.org/home
    coda: https://coda.io/@active-inference-institute/active-inference-ontology-website
    docs: docs/README.md          # repo-relative path (validated to exist)

artifacts:
  - path: Ontology_v5_May_25_2023.csv
    kind: source
    description: Canonical source — one row per term.
  - path: ontology.json
    kind: export
    description: Machine-readable export generated from the CSV.
  - path: releases.json
    kind: dataset
    description: Machine-readable release manifest (current + archived).
  - path: scripts/build_json.py
    kind: code
    description: Regenerates ontology.json from the latest CSV.
  - path: SUMO
    kind: dataset
    description: Suggested Upper Merged Ontology mapping material.

