repo:
  name: Active_Inference_Ontology
  slug: active-inference-ontology
  full_name: ActiveInferenceInstitute/Active_Inference_Ontology
  description: >-
    A public, controlled vocabulary of Active Inference and Free Energy Principle
    concepts — each term with a tag, definitions, examples, and declared connections.
  default_branch: main
  homepage: https://www.activeinference.org/home

institute:
  affiliation: institute        # institute | ecosystem
  category: ontology            # InstituteOS domain
  status: active                # active | wip | archived | deprecated
  maturity: released            # experimental | wip | released | stable
  steward: Active Inference Institute

ecosystem:
